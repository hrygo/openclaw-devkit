# ==============================================================================
# OpenClaw Docker Compose Development Environment
# ==============================================================================
# Quick Start:
#   ./docker-dev-setup.sh                              # 启动服务
#   docker compose -f docker-compose.dev.yml logs -f   # 查看日志
#   docker compose -f docker-compose.dev.yml down      # 停止服务
#
# Key Features:
#   - Claude Code CLI 内置
#   - 代理配置 (访问 Google/Claude API)
#   - Go/TypeScript/Python 开发环境
#   - 浏览器自动化 (Playwright)
#   - Office 文件处理 (pandoc + LaTeX)
# ==============================================================================

# ------------------------------------------------------------------------------
# YAML Anchors for DRY Configuration
# ------------------------------------------------------------------------------
x-openclaw-common: &openclaw-common
  image: ${OPENCLAW_IMAGE:-openclaw}
  environment: &common-env
    HOST_UID: ${HOST_UID:-1000}
    # ─────────────────────────────────────────────────────────────────
    # Proxy Configuration
    # ─────────────────────────────────────────────────────────────────
    # Required for accessing Google and Claude API from restricted network environments
    # Ports: 7897 (HTTP proxy), 15721 (Claude API proxy)
    # ─────────────────────────────────────────────────────────────────
    HTTP_PROXY: ${HTTP_PROXY:-}
    HTTPS_PROXY: ${HTTPS_PROXY:-}
    NO_PROXY: localhost,127.0.0.1,host.docker.internal,.local,.internal
    # ─────────────────────────────────────────────────────────────────
    # Claude API Configuration
    # ─────────────────────────────────────────────────────────────────
    ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
    ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
    API_TIMEOUT_MS: "3000000"
    CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
    CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS: "1"
    # ─────────────────────────────────────────────────────────────────
    # Runtime Configuration
    # ─────────────────────────────────────────────────────────────────
    PLAYWRIGHT_BROWSERS_PATH: /home/node/.cache/ms-playwright
    HOME: /home/node
    # Fallback for host HOME to satisfy docker-compose volume interpolation on Windows
    HOST_HOME: ${HOME:-${USERPROFILE:-/tmp}}
    TERM: xterm-256color
    # ─────────────────────────────────────────────────────────────────
    # Python Tools Auto-Install (space-separated, format: pkg[:bin])
    # Examples: "notebooklm", "pandas", "black:blackd"
    # Tools are installed to system Python via uv on first startup
    # ─────────────────────────────────────────────────────────────────
    PIP_TOOLS: ${PIP_TOOLS:-notebooklm-py:notebooklm}
    # NotebookLM config path (shared with host via bind mount)
    NOTEBOOKLM_STORAGE: /home/node/.notebooklm/storage_state.json
  extra_hosts:
    - "host.docker.internal:host-gateway"
  logging: &common-logging
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"
  deploy: &common-deploy
    resources:
      limits:
        memory: 4G
        cpus: '4.0'
      reservations:
        memory: 1G
        cpus: '0.5'
  restart: unless-stopped

# ------------------------------------------------------------------------------
# Named Volumes
# ------------------------------------------------------------------------------
volumes:
  openclaw-node-modules:
    name: openclaw-node-modules
  openclaw-go-mod:
    name: openclaw-go-mod
  openclaw-playwright-cache:
    name: openclaw-playwright-cache
  openclaw-playwright-bin:
    name: openclaw-playwright-bin
  # Unified state storage for sessions, identities, and logs
  openclaw-state:
    name: openclaw-state

services:
  # ============================================================================
  # OpenClaw Gateway
  # ============================================================================

  openclaw-gateway:
    <<: *openclaw-common
    user: "0:0" # Run as root to fix permissions - enabled to fix EACCES
    container_name: openclaw-gateway
    ports:
      - "127.0.0.1:${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "127.0.0.1:${OPENCLAW_BRIDGE_PORT:-18790}:18790"
      - "127.0.0.1:${OPENCLAW_BROWSER_PORT:-18791}:18791"
    env_file:
      - .env
    environment:
      - OPENCLAW_CONFIG_DIR=/home/node/.openclaw
      - OPENCLAW_WORKSPACE_DIR=/home/node/.openclaw/workspace
    init: true
    volumes:
      # === 必需挂载 (Required) ===
      # 使用 .env 中定义的变量 (OPENCLAW_CONFIG_DIR, OPENCLAW_WORKSPACE_DIR)
      # OpenClaw config seed (mount host dir to separate path)
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw-seed:ro
      # Workspace (AI working directory - required!)
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace:rw
      # Unified state volume for persistent container data
      - openclaw-state:/home/node/.openclaw:rw
      # Mount local entrypoint to apply fixes without rebuilding
      - ./docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh:ro

      # === 可选挂载 (Optional) - 根据需求选择 ===
      # Claude Code session state (shared with host)
      - ${HOME:-${USERPROFILE:-/tmp}}/.claude:/home/node/.claude:rw
      # NotebookLM auth and config (shared with host)
      - ${HOME:-${USERPROFILE:-/tmp}}/.notebooklm:/home/node/.notebooklm:rw
      # Agents skills (read-only, shared with host)
      - ${HOME:-${USERPROFILE:-/tmp}}/.agents/skills:/home/node/.agents/skills:ro
      # Named volumes for caches (optional, speeds up restarts)
      - openclaw-node-modules:/app/node_modules:rw
      - openclaw-go-mod:/home/node/go/pkg/mod:rw
      - openclaw-playwright-cache:/home/node/.cache/ms-playwright:rw
      # -------------------------------------------------------------------------
      # 🔌 添加额外挂载点 (Extend with custom mounts)
      # -------------------------------------------------------------------------
      # 示例 (Examples):
      #   - /your/project/path:/home/node/projects:rw
      #   - /Users/yourname/Downloads:/home/node/Downloads:rw
      #   - /shared/team-config:/home/node/team-config:ro
      #
      # 格式: 宿主机路径:容器内路径:访问模式 (rw=读写, ro=只读)
      # Format: host_path:container_path:access_mode (rw=read-write, ro=read-only)
      #
      # 修改后执行: make down && make up
      # After modifying: make down && make up
      # -------------------------------------------------------------------------
      # 移除复杂的 inline command，改用容器内置 entrypoint
      # command: ["openclaw", "gateway", "--allow-unconfigured"]
    healthcheck: &common-healthcheck
      # Use 127.0.0.1 for more stable local check
      test: [ "CMD", "node", "-e", "require('http').get('http://127.0.0.1:18789/healthz', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))" ]
      interval: 20s
      timeout: 15s
      retries: 10
      start_period: 60s
    labels:
      - "openclaw.service=gateway"
      - "openclaw.environment=dev"
